<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-50 bg-slate-900 flex items-center justify-center text-white">
        <h1 class="text-2xl font-bold">Loading PayPlus...</h1>
    </div>

    <!-- Main Content -->
    <div id="main-app" class="hidden flex-1 overflow-y-auto pb-20 p-4">
        <!-- Header -->
        <div class="bg-gradient-to-r from-amber-700 to-amber-900 p-5 rounded-2xl text-white mb-4">
            <p class="text-xs opacity-80">TOTAL BALANCE</p>
            <h2 class="text-3xl font-bold">$3.95</h2>
            <p class="text-xs mt-2">Welcome, <span id="username"></span></p>
        </div>

        <!-- Pages -->
        <div id="page-ads" class="page">Ads Page Content</div>
        <div id="page-tasks" class="page hidden">Tasks Page Content</div>
        <div id="page-invite" class="page hidden">Invite Page Content</div>
        <div id="page-withdraw" class="page hidden">Withdraw Page Content</div>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3">
        <button onclick="showPage('ads')"><i class="fas fa-play"></i><br>Ads</button>
        <button onclick="showPage('tasks')"><i class="fas fa-tasks"></i><br>Tasks</button>
        <button onclick="showPage('invite')"><i class="fas fa-users"></i><br>Invite</button>
        <button onclick="showPage('withdraw')"><i class="fas fa-dollar-sign"></i><br>Withdraw</button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
        }

        async function startApp() {
            const user = tg.initDataUnsafe.user;
            if (user) {
                document.getElementById('username').innerText = user.first_name;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                document.body.innerHTML = "<h1 class='p-10 text-red-500'>تکایە تەنها لە تێلێگرامەوە بیکەرەوە!</h1>";
            }
        }
        startApp();
    </script>
</body>
</html>
