<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <meta name="adsbitvex-verify" content="DVFjwarVRYVrNCekL7PvxdHW">
  
  <!-- زیادکردنی سکرێپتی Adsbitvex -->
  <script src="https://sdk.adsbitvex.com/functions/v1/ad-script?appid=000209"></script>
  
  <title>CoinZilla</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js" async></script>

  <script>
    const CONFIG = {
      adNetwork: 'adsgram',
      adsgramBlockId: '37976',
      rewardPerAd: 10,       
      maxAdsPerDay: 100,     
      telegramContact: 'https://t.me/DefiDragon',  
      appName: 'CoinZilla',                         
    };
  </script>

  <style>
    :root {
      --bg: #0f0f0f;
      --primary: #8774e1;
      --gold: #f0c040;
      --text: #ffffff;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; }
    .balance-card { background: linear-gradient(135deg, #1a1030 0%, #2d1f5e 100%); border: 1px solid rgba(135,116,225,.35); }
    .watch-btn { background: linear-gradient(135deg, #f0c040 0%, #8774e1 100%); }
    .secondary-btn { background: linear-gradient(135deg, #444 0%, #222 100%); border: 1px solid #666; }
    .watch-btn:disabled { background: #333; opacity:.7; }
    .page { display:none; }
    .page.active { display:block; }
    .bottom-nav { position:fixed; bottom:10px; width:100%; max-width:480px; background: rgba(20,20,20,.96); border-top: 1px solid rgba(135,116,225,.2); z-index: 50; }
  </style>
</head>

<body>
<div id="toast" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; padding:10px 20px; background:#333; color:white; border-radius:10px; display:none;"></div>

<div id="app">
  <div id="page-home" class="page active">
    <div class="px-4 pt-5">
      <div class="balance-card rounded-3xl p-5">
        <div class="text-sm">Total Balance</div>
        <div class="text-5xl font-black" id="main-bal">0</div>
      </div>
    </div>

    <div class="px-4 pt-4">
      <button id="watch-btn" onclick="watchAd()" class="watch-btn w-full py-5 rounded-2xl font-bold">
        Watch Ad & Earn (Adsgram)
      </button>
    </div>

    <div class="px-4 pt-4">
      <button id="secondary-btn" onclick="handleSecondaryAd()" class="secondary-btn w-full py-4 rounded-2xl font-bold">
        Watch 15s Ad (Adsbitvex)
      </button>
    </div>
  </div>

  <nav class="bottom-nav flex justify-around p-4">
    <button onclick="switchPage('home', this)">Home</button>
    <button onclick="switchPage('tasks', this)">Tasks</button>
  </nav>
</div>

<script>
'use strict';
let state = JSON.parse(localStorage.getItem('defidragon_v1')) || { balance: 0, adsToday: 0 };

function updateUI() {
  document.getElementById('main-bal').textContent = state.balance;
  document.getElementById('watch-btn').disabled = (state.adsToday >= CONFIG.maxAdsPerDay);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function watchAd() {
  const btn = document.getElementById('watch-btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  const controller = await window.Adsgram.init({ blockId: CONFIG.adsgramBlockId });
  controller.show().then(() => {
    state.balance += CONFIG.rewardPerAd;
    state.adsToday += 1;
    localStorage.setItem('defidragon_v1', JSON.stringify(state));
    updateUI();
    toast('Reward added!');
    btn.textContent = 'Watch Ad & Earn (Adsgram)';
    btn.disabled = false;
  }).catch(() => {
    toast('Ad failed.');
    btn.textContent = 'Watch Ad & Earn (Adsgram)';
    btn.disabled = false;
  });
}

// فەنکشنی نوێ بۆ Adsbitvex
async function handleSecondaryAd() {
    const btn = document.getElementById('secondary-btn');
    btn.disabled = true;
    btn.textContent = 'Loading...';
    
    try {
        await window.showadsbitvex();
        state.balance += CONFIG.rewardPerAd;
        localStorage.setItem('defidragon_v1', JSON.stringify(state));
        updateUI();
        toast('Reward earned!');
    } catch (e) {
        toast('Ad failed.');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Watch 15s Ad (Adsbitvex)';
    }
}

function switchPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

updateUI();
</script>
</body>
</html>
