<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameToZone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-900 text-white h-screen flex flex-col items-center justify-center">

    <div id="auth-screen" class="text-center">
        <h1 class="text-2xl font-bold mb-4">Loading GameToZone...</h1>
    </div>

    <div id="main-app" class="hidden w-full h-full p-4">
        <h1 class="text-xl">Welcome, <span id="username"></span></h1>
    </div>

    <script>
        const appId = "topkurd-2799c";
        const firebaseConfig = {
            apiKey: "AIzaSyDt2kWrpOg3YcYb2v1p7RIohALvQ6iBap8",
            authDomain: "topkurd-2799c.firebaseapp.com",
            projectId: "topkurd-2799c",
            storageBucket: "topkurd-2799c.firebasestorage.app",
            messagingSenderId: "999271629770",
            appId: "1:999271629770:web:e92f9305589c512eed8533"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.ready();

        // لێرەدا ڕاستەوخۆ IDـی تێلێگرام وەردەگرین
        async function startApp() {
            const user = tg.initDataUnsafe.user;
            
            if (user) {
                // بەکارهێنانی IDـی تێلێگرام بۆ Auth
                try {
                    // لێرەدا دەتوانیت Custom Token بەکاربهێنیت یان تەنها IDـکە وەک UID بەکاربهێنیت
                    console.log("Telegram User ID:", user.id);
                    document.getElementById('username').innerText = user.first_name;
                    
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                } catch (e) {
                    alert("Error: " + e.message);
                }
            } else {
                document.getElementById('auth-screen').innerHTML = "<h1 class='text-red-500'>تکایە تەنها لەناو تێلێگرامەوە بیکەرەوە!</h1>";
            }
        }

        startApp();
    </script>
</body>
</html>
